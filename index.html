const GOAL = 65.0; // 用户目标体重（修改此值）
const GOAL_DATE = '目标日期（可修改）';
// ===== 以下为渲染逻辑 =====
// ===== 以下为渲染逻辑 =====
const DAYS = ['日','一','二','三','四','五','六'];
function dayOfWeek(d) { return DAYS[new Date(d).getDay()]; }
function fmt(d) { return d.slice(5).replace('-','/'); }
function diffDays(a, b) { return Math.round((new Date(b)-new Date(a))/86400000); }

const withWeight = DATA.filter(d => d.weight !== null);

if (withWeight.length < 1) {
  document.getElementById('weeklyCards').innerHTML = '<div class="no-data glass"><div class="emoji">📝</div>还没有数据<br>商茗舒 快来报体重吧</div>';
} else {
  const first = withWeight[0];
  const last = withWeight[withWeight.length - 1];
  const days = diffDays(first.date, last.date);
  const loss = first.weight - last.weight;
  const weeks = days / 7 || 1;

  document.getElementById('startW').textContent = first.weight.toFixed(1);
  document.getElementById('startDate').textContent = fmt(first.date);
  document.getElementById('currentW').textContent = last.weight.toFixed(1);
  document.getElementById('currentDate').textContent = fmt(last.date);
  document.getElementById('totalLoss').textContent = (loss >= 0 ? '-' : '+') + Math.abs(loss).toFixed(1) + 'kg';
  document.getElementById('totalDays').textContent = days + '天';
  document.getElementById('weeklyAvg').textContent = (loss / weeks).toFixed(2);

  if (GOAL !== null) {
    document.getElementById('goalW').textContent = GOAL.toFixed(1);
    document.getElementById('goalDate').textContent = GOAL_DATE;
    document.getElementById('toGoal').textContent = (last.weight - GOAL).toFixed(1) + 'kg';

    const totalToLose = first.weight - GOAL;
    const lost = first.weight - last.weight;
    const pct = totalToLose > 0 ? Math.min(100, (lost / totalToLose * 100)).toFixed(0) : 0;
    document.getElementById('pStart').textContent = first.weight.toFixed(1);
    document.getElementById('pGoal').textContent = GOAL.toFixed(1);
    document.getElementById('pPercent').textContent = pct + '%';
    setTimeout(() => { document.getElementById('progressFill').style.width = pct + '%'; }, 100);
  }

  // Chart
  const chartLabels = withWeight.map(d => fmt(d.date));
  const chartData = withWeight.map(d => d.weight);

  const gradient = document.getElementById('weightChart').getContext('2d');
  const gFill = gradient.createLinearGradient(0, 0, 0, 300);
  gFill.addColorStop(0, 'rgba(255, 127, 0, 0.25)');
  gFill.addColorStop(1, 'rgba(255, 127, 0, 0.02)');

  const datasets = [
    {
      label: '体重 (kg)',
      data: chartData,
      borderColor: '#FF7F00',
      backgroundColor: gFill,
      fill: true,
      tension: 0.4,
      borderWidth: 2.5,
      pointBackgroundColor: '#fff',
      pointBorderColor: '#FF7F00',
      pointBorderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 8,
    }
  ];

  if (GOAL !== null) {
    datasets.push({
      label: '目标 ' + GOAL + 'kg',
      data: Array(chartLabels.length).fill(GOAL),
      borderColor: 'rgba(76, 175, 80, 0.4)',
      borderDash: [6, 4],
      borderWidth: 1.5,
      pointRadius: 0,
      fill: false,
    });
  }

  new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: { labels: chartLabels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true, position: 'top', labels: { font: { size: 11 }, color: '#0066CC', usePointStyle: true, padding: 16 } },
        tooltip: {
          backgroundColor: 'rgba(255,240,245,0.95)',
          titleColor: '#003366',
          bodyColor: '#0066CC',
          borderColor: 'rgba(233,30,99,0.2)',
          borderWidth: 1,
          cornerRadius: 10,
          padding: 12,
          callbacks: {
            afterLabel: function(ctx) {
              if (ctx.datasetIndex === 0) {
                const d = withWeight[ctx.dataIndex];
                let s = '';
                if (d.exercise) s += '🏃 ' + d.exercise;
                if (d.note) s += (s ? '\n' : '') + d.note;
                return s;
              }
            }
          }
        }
      },
      scales: {
        y: {
          min: GOAL ? Math.floor(GOAL - 1) : Math.floor(last.weight - 2),
          max: Math.ceil(first.weight + 0.5),
          ticks: { callback: v => v + 'kg', font: { size: 11 }, color: '#004080' },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        x: {
          ticks: { font: { size: 10 }, maxRotation: 45, color: '#004080' },
          grid: { display: false }
        }
      }
    }
  });

  // Weekly cards
  function getWeekNum(dateStr) { return Math.floor(diffDays(DATA[0].date, dateStr) / 7); }
  const weekMap = {};
  withWeight.forEach(d => {
    const wk = getWeekNum(d.date);
    if (!weekMap[wk]) weekMap[wk] = [];
    weekMap[wk].push(d);
  });
  const weeklyEl = document.getElementById('weeklyCards');
  Object.keys(weekMap).sort((a,b) => a-b).forEach(wk => {
    const entries = weekMap[wk];
    const wStart = entries[0].weight;
    const wEnd = entries[entries.length-1].weight;
    const wLoss = wStart - wEnd;
    const card = document.createElement('div');
    card.className = 'week-card glass';
    card.innerHTML = `
      <div class="wk">第${parseInt(wk)+1}周</div>
      <div class="wv">${wLoss >= 0 ? '-' : '+'}${Math.abs(wLoss).toFixed(1)}kg</div>
      <div class="wk">${wStart.toFixed(1)} → ${wEnd.toFixed(1)}</div>
    `;
    weeklyEl.appendChild(card);
  });
}

// Table
const tbody = document.getElementById('tableBody');
let prevWeight = null;
DATA.forEach(d => {
  const tr = document.createElement('tr');
  let changeHtml = '<span class="weight-same">-</span>';
  if (d.weight !== null) {
    if (prevWeight !== null) {
      const diff = d.weight - prevWeight;
      if (diff < 0) changeHtml = `<span class="weight-down">${diff.toFixed(1)}</span>`;
      else if (diff > 0) changeHtml = `<span class="weight-up">+${diff.toFixed(1)}</span>`;
      else changeHtml = `<span class="weight-same">0</span>`;
    }
    prevWeight = d.weight;
  }
  const exerciseHtml = d.exercise ? `<span class="exercise-tag">${d.exercise}</span>` : '';
  const weightVal = d.weight !== null ? d.weight.toFixed(1) : '-';
  let weightCell = `<td style="font-weight:600">${weightVal}`;
  if (d.body) {
    const b = d.body;
    weightCell += `<span class="body-info"><span class="info-icon" onclick="this.nextElementSibling.classList.toggle('show')">ⓘ</span><span class="body-tip"><div class="tip-row"><span class="tip-label">体脂率</span><span class="tip-val">${b.bf}%</span></div><div class="tip-row"><span class="tip-label">肌肉量</span><span class="tip-val">${b.muscle}kg</span></div><div class="tip-row"><span class="tip-label">内脏脂肪</span><span class="tip-val">${b.visceral}</span></div>${b.bmi ? `<div class="tip-row"><span class="tip-label">BMI</span><span class="tip-val">${b.bmi}</span></div>` : ''}</span></span>`;
  }
  weightCell += '</td>';
  tr.innerHTML = `
    <td>${fmt(d.date)}</td>

    ${weightCell}
    <td>${changeHtml}</td>
    <td>${exerciseHtml}</td>
    <td>${d.note || ''}</td>
  `;
  tbody.appendChild(tr);
});

// Group meals by meal name for carousel (merge items of same meal into one card)
function groupMeals(meals) {
  const map = {};
  meals.forEach(m => {
    const key = m.meal;
    if (!map[key]) map[key] = { meal: m.meal, items: [], photos: [], cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
    map[key].items.push({ name: m.items, cal: m.cal });
    if (m.photo) map[key].photos.push(m.photo);
    map[key].cal += m.cal || 0;
    map[key].protein += m.protein || 0;
    map[key].carbs += m.carbs || 0;
    map[key].fat += m.fat || 0;
    map[key].fiber += m.fiber || 0;
  });
  return Object.values(map);
}

function buildCarousel(wrapEl, trackEl, dotsEl, grouped) {
  let idx = 0;
  grouped.forEach(g => {
    const card = document.createElement('div');
    card.className = 'carousel-card glass';
    const photoHtml = g.photos.length === 1
      ? `<img class="cc-photo" src="${g.photos[0]}" alt="${g.meal}" loading="lazy">`
      : g.photos.length > 1
        ? `<div class="cc-collage cc-collage-${Math.min(g.photos.length, 4)}">${g.photos.slice(0, 4).map(p => `<img src="${p}" alt="${g.meal}" loading="lazy">`).join('')}</div>`
        : '';
    const itemsHtml = g.items.map(i => `<div class="cc-item"><span>${i.name}</span><span>${f(i.cal)} kcal</span></div>`).join('');
    card.innerHTML = `
      <div class="cc-header"><span class="cc-meal">${g.meal}</span><span class="cc-cal">${f(g.cal)} kcal</span></div>
      ${photoHtml}
      <div class="cc-items">${itemsHtml}</div>
      <div class="cc-macros">
        <span>蛋白质 ${f(g.protein)}g</span><span>碳水 ${f(g.carbs)}g</span><span>脂肪 ${f(g.fat)}g</span>
        ${g.fiber ? `<span>纤维 ${f(g.fiber)}g</span>` : ''}
      </div>
    `;
    trackEl.appendChild(card);
  });
  // dots
  grouped.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });
  // arrows
  if (grouped.length > 1) {
    const prev = document.createElement('button');
    prev.className = 'carousel-nav prev';
    prev.innerHTML = '‹';
    prev.onclick = () => goTo(Math.max(0, idx - 1));
    const next = document.createElement('button');
    next.className = 'carousel-nav next';
    next.innerHTML = '›';
    next.onclick = () => goTo(Math.min(grouped.length - 1, idx + 1));
    wrapEl.appendChild(prev);
    wrapEl.appendChild(next);
  }
  function goTo(i) {
    idx = i;
    trackEl.style.transform = `translateX(-${i * 100}%)`;
    dotsEl.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i));
  }
  // swipe
  let startX = 0;
  trackEl.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
  trackEl.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(Math.max(0, Math.min(grouped.length - 1, idx + (diff > 0 ? 1 : -1))));
  });
}

// Today's meals carousel
const today = new Date().toISOString().slice(0, 10);
const todayMeals = MEALS.filter(m => m.date === today);
const todayTrack = document.getElementById('todayTrack');
const todayDots = document.getElementById('todayDots');

if (todayMeals.length === 0) {
  todayCarousel.innerHTML = '<div class="no-meals glass">今天还没有饮食记录 🍽️</div>';
} else {
  const grouped = groupMeals(todayMeals);
  buildCarousel(todayCarousel, todayTrack, todayDots, grouped);
  document.getElementById('todaySummary').style.display = 'block';
  let tCal = 0, tP = 0, tC = 0, tF = 0, tFiber = 0;
  todayMeals.forEach(m => { tCal += m.cal||0; tP += m.protein||0; tC += m.carbs||0; tF += m.fat||0; tFiber += m.fiber||0; });
  document.getElementById('todayCal').textContent = f(tCal);
  document.getElementById('todayCalTarget').textContent = `/ ${DAILY_TARGET.cal} kcal`;
  document.getElementById('todayP').textContent = f(tP);
  document.getElementById('todayPTarget').textContent = `/ ${DAILY_TARGET.protein}g`;
  document.getElementById('todayC').textContent = f(tC);
  document.getElementById('todayCTarget').textContent = `/ ${DAILY_TARGET.carbs}g`;
  document.getElementById('todayF').textContent = f(tF);
  document.getElementById('todayFTarget').textContent = `/ ${DAILY_TARGET.fat}g`;
  document.getElementById('todayFiber').textContent = f(tFiber);
  document.getElementById('todayCount').textContent = grouped.length;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
  });
});

// Diet history (all days) - carousel per day
const dietEl = document.getElementById('dietHistory');
if (MEALS.length === 0) {
  dietEl.innerHTML = '<div class="no-meals glass" style="margin:10px 0;">还没有饮食记录 🍽️</div>';
} else {
  const dayMap = {};
  MEALS.forEach(m => { if (!dayMap[m.date]) dayMap[m.date] = []; dayMap[m.date].push(m); });
  Object.keys(dayMap).sort().reverse().forEach(date => {
    const meals = dayMap[date];
    const dayCal = meals.reduce((s, m) => s + (m.cal || 0), 0);
    const grouped = groupMeals(meals);

    const section = document.createElement('div');
    section.className = 'diet-day glass';
    section.innerHTML = `
      <div class="diet-day-header">
        <span>${fmt(date)} 星期${dayOfWeek(date)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="day-cal">${f(dayCal)} kcal</span>
          <span class="toggle-icon">›</span>
        </span>
      </div>
      <div class="diet-day-body">
        <div class="carousel-wrap"><div class="carousel-track"></div><div class="carousel-dots"></div></div>
      </div>
    `;
    const header = section.querySelector('.diet-day-header');
    const body = section.querySelector('.diet-day-body');
    const icon = section.querySelector('.toggle-icon');
    header.addEventListener('click', () => {
      const open = body.style.display === 'block';
      body.style.display = open ? 'none' : 'block';
      icon.classList.toggle('open', !open);
      if (!body.dataset.init) {
        const cWrap = body.querySelector('.carousel-wrap');
        buildCarousel(cWrap, cWrap.querySelector('.carousel-track'), cWrap.querySelector('.carousel-dots'), grouped);
        body.dataset.init = '1';
      }
    });
    dietEl.appendChild(section);
  });
}
// Close body tooltips on outside click
document.addEventListener('click', e => {
  if (!e.target.classList.contains('info-icon')) {
    document.querySelectorAll('.body-tip.show').forEach(t => t.classList.remove('show'));
  }
});
